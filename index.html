<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio Hirune</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f5f0;
        color: #1f2528;
        --sketchbook-width: min(100%, 680px);
        --sketchbook-max-height: min(49vh, 520px);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
      }

      .site-nav {
        position: fixed;
        top: 16px;
        left: 50%;
        z-index: 10;
        display: flex;
        width: min(calc(100% - 32px), 760px);
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px;
        border: 1px solid rgba(31, 37, 40, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 12px 36px rgba(31, 37, 40, 0.12);
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -18px);
        transition:
          opacity 180ms ease,
          transform 180ms ease,
          visibility 180ms ease;
        visibility: hidden;
      }

      .site-nav.is-visible {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, 0);
        visibility: visible;
      }

      .site-nav a {
        display: inline-flex;
        min-height: 36px;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
        border-radius: 6px;
        color: inherit;
        font-size: 0.88rem;
        line-height: 1;
        text-decoration: none;
        white-space: nowrap;
      }

      .site-nav a:hover,
      .site-nav a:focus-visible {
        background: #1f2528;
        color: #ffffff;
        outline: 0;
      }

      main {
        width: 100%;
      }

      section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
      }

      section:nth-child(even) {
        background: #ffffff;
      }

      #home {
        align-items: stretch;
        justify-content: stretch;
        padding: 0;
      }

      .home-grid {
        display: grid;
        grid-template-areas:
          "sketchbook proyectos galeria"
          "about empty-a empty-b";
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
        min-height: 100vh;
        width: 100%;
      }

      .home-cell {
        display: flex;
        min-width: 0;
        min-height: 0;
        align-items: center;
        justify-content: center;
      }

      .home-cell--sketchbook {
        grid-area: sketchbook;
      }

      .home-cell--proyectos {
        grid-area: proyectos;
      }

      .home-cell--galeria {
        grid-area: galeria;
      }

      .home-cell--about {
        grid-area: about;
      }

      .home-cell--empty-a {
        grid-area: empty-a;
      }

      .home-cell--empty-b {
        grid-area: empty-b;
      }

      .home-tile {
        position: relative;
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        color: inherit;
        cursor: pointer;
        text-decoration: none;
      }

      .home-placeholder {
        width: min(78%, 260px);
        min-height: 124px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(31, 37, 40, 0.22);
        border-radius: 8px;
        color: rgba(31, 37, 40, 0.72);
        font-size: clamp(1.35rem, 2.4vw, 2.6rem);
        line-height: 1;
        text-align: center;
        transition:
          border-color 180ms ease,
          color 180ms ease;
      }

      .home-tile:hover .home-placeholder,
      .home-tile:focus-visible .home-placeholder {
        border-color: #1f2528;
        color: #1f2528;
      }

      .sketchbook-tile img {
        display: block;
        width: var(--sketchbook-width);
        max-height: var(--sketchbook-max-height);
        object-fit: contain;
        transition: opacity 180ms ease;
      }

      .sketchbook-hover {
        position: absolute;
        top: 50%;
        left: 50%;
        width: var(--sketchbook-width);
        max-height: var(--sketchbook-max-height);
        opacity: 0;
        transform: translate(-50%, -50%);
      }

      .sketchbook-tile:hover .sketchbook-default {
        opacity: 0;
      }

      .sketchbook-tile:hover .sketchbook-hover {
        opacity: 1;
      }

      .sketchbook-tile:focus-visible {
        outline: 2px solid #1f2528;
        outline-offset: -8px;
      }

      .scroll-cue {
        position: fixed;
        bottom: 24px;
        left: 24px;
        z-index: 9;
        display: flex;
        width: 44px;
        height: 44px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(31, 37, 40, 0.2);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 12px 32px rgba(31, 37, 40, 0.12);
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
        transition:
          opacity 220ms ease,
          transform 220ms ease,
          visibility 220ms ease;
        visibility: hidden;
      }

      .scroll-cue.is-visible {
        opacity: 1;
        transform: translateY(0);
        visibility: visible;
      }

      .scroll-cue::before {
        content: "";
        width: 12px;
        height: 12px;
        border-right: 2px solid #1f2528;
        border-bottom: 2px solid #1f2528;
        transform: translateY(-3px) rotate(45deg);
        animation: scroll-cue-bounce 1100ms ease-in-out infinite;
      }

      @keyframes scroll-cue-bounce {
        0%,
        100% {
          transform: translateY(-5px) rotate(45deg);
        }

        50% {
          transform: translateY(3px) rotate(45deg);
        }
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      h1,
      h2 {
        margin: 0;
        font-size: clamp(2.75rem, 8vw, 7rem);
        font-weight: 400;
        line-height: 1;
        text-align: center;
      }

      @media (max-width: 720px) {
        :root {
          --sketchbook-width: min(96vw, 480px);
          --sketchbook-max-height: 34vh;
        }

        .site-nav {
          top: 12px;
          width: min(calc(100% - 24px), 420px);
        }

        .home-grid {
          grid-template-areas:
            "proyectos"
            "sketchbook"
            "galeria"
            "about";
          grid-template-columns: 1fr;
          grid-template-rows: 21vh 37vh 21vh 21vh;
        }

        .home-cell--empty-a,
        .home-cell--empty-b {
          display: none;
        }

        .home-placeholder {
          width: min(82%, 300px);
          min-height: 78px;
          font-size: clamp(1.3rem, 8vw, 2.45rem);
        }

        .scroll-cue {
          bottom: 18px;
          left: 18px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="site-nav" aria-label="Navegacion principal" aria-hidden="true">
      <a href="#home">Home</a>
      <a href="#about-me">About Me</a>
      <a href="#proyectos">Proyectos</a>
      <a href="#sketchbook">Sketchbook</a>
      <a href="#galeria">Galeria</a>
      <a href="#contacto">Contacto</a>
    </nav>

    <main>
      <section id="home" aria-labelledby="home-title">
        <h1 id="home-title" class="visually-hidden">Home</h1>
        <div class="home-grid">
          <div class="home-cell home-cell--sketchbook">
            <a class="home-tile sketchbook-tile" href="#sketchbook" aria-label="Ir a Sketchbook">
              <img
                class="sketchbook-default"
                src="assets/sketchbook_default.png"
                alt=""
              >
              <img
                class="sketchbook-hover"
                src="assets/sketchbook_hover.png"
                alt=""
              >
            </a>
          </div>
          <div class="home-cell home-cell--proyectos">
            <a class="home-tile" href="#proyectos">
              <span class="home-placeholder">Proyectos</span>
            </a>
          </div>
          <div class="home-cell home-cell--galeria">
            <a class="home-tile" href="#galeria">
              <span class="home-placeholder">Galeria</span>
            </a>
          </div>
          <div class="home-cell home-cell--about">
            <a class="home-tile" href="#about-me">
              <span class="home-placeholder">About Me</span>
            </a>
          </div>
          <div class="home-cell home-cell--empty-a"></div>
          <div class="home-cell home-cell--empty-b"></div>
        </div>
        <div class="scroll-cue" aria-hidden="true"></div>
      </section>

      <section id="about-me" aria-labelledby="about-me-title">
        <h2 id="about-me-title">About Me</h2>
      </section>

      <section id="proyectos" aria-labelledby="proyectos-title">
        <h2 id="proyectos-title">Proyectos</h2>
      </section>

      <section id="sketchbook" aria-labelledby="sketchbook-title">
        <h2 id="sketchbook-title">Sketchbook</h2>
      </section>

      <section id="galeria" aria-labelledby="galeria-title">
        <h2 id="galeria-title">Galeria</h2>
      </section>

      <section id="contacto" aria-labelledby="contacto-title">
        <h2 id="contacto-title">Contacto</h2>
      </section>
    </main>
    <script>
      const siteNav = document.querySelector(".site-nav");
      const scrollCue = document.querySelector(".scroll-cue");
      const homeSection = document.querySelector("#home");
      let scrollCueTimer;
      let scrollCueTimerStarted = false;

      function isHomeRoute() {
        return window.location.hash === "" || window.location.hash === "#home";
      }

      function isInHomeSection() {
        const homeBounds = homeSection.getBoundingClientRect();
        return isHomeRoute() && homeBounds.top <= 1 && homeBounds.bottom > 1;
      }

      function updateScrollCueVisibility() {
        if (!isInHomeSection()) {
          window.clearTimeout(scrollCueTimer);
          scrollCueTimerStarted = false;
          scrollCue.classList.remove("is-visible");
          return;
        }

        if (!scrollCueTimerStarted) {
          scrollCueTimerStarted = true;
          scrollCueTimer = window.setTimeout(() => {
            if (isInHomeSection()) {
              scrollCue.classList.add("is-visible");
            }
          }, 4000);
        }
      }

      function updateNavVisibility() {
        const hasLeftHome = homeSection.getBoundingClientRect().bottom <= 1;
        const showNav = hasLeftHome || !isHomeRoute();

        siteNav.classList.toggle("is-visible", showNav);
        siteNav.setAttribute("aria-hidden", String(!showNav));
        updateScrollCueVisibility();
      }

      updateNavVisibility();
      window.addEventListener("scroll", updateNavVisibility, { passive: true });
      window.addEventListener("resize", updateNavVisibility);
      window.addEventListener("hashchange", updateNavVisibility);
      window.addEventListener("load", updateNavVisibility);
    </script>
  </body>
</html>
