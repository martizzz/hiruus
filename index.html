<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio Hirune</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7f5f0;
        color: #1f2528;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
      }

      main {
        width: 100%;
      }

      section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
      }

      section:nth-child(even) {
        background: #ffffff;
      }

      #home {
        align-items: stretch;
        justify-content: stretch;
        padding: 0;
      }

      .home-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
        min-height: 100vh;
        width: 100%;
      }

      .home-cell {
        display: flex;
        min-width: 0;
        min-height: 0;
        align-items: center;
        justify-content: center;
      }

      .sketchbook-tile {
        position: relative;
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .sketchbook-tile img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transition: opacity 180ms ease;
      }

      .sketchbook-hover {
        position: absolute;
        inset: 0;
        opacity: 0;
      }

      .sketchbook-tile:hover .sketchbook-default {
        opacity: 0;
      }

      .sketchbook-tile:hover .sketchbook-hover {
        opacity: 1;
      }

      .sketchbook-tile:focus-visible {
        outline: 2px solid #1f2528;
        outline-offset: -8px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      h1,
      h2 {
        margin: 0;
        font-size: clamp(2.75rem, 8vw, 7rem);
        font-weight: 400;
        line-height: 1;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="home" aria-labelledby="home-title">
        <h1 id="home-title" class="visually-hidden">Home</h1>
        <div class="home-grid">
          <div class="home-cell">
            <a class="sketchbook-tile" href="#sketchbook" aria-label="Ir a Sketchbook">
              <img
                class="sketchbook-default"
                src="assets/sketchbook_default.png"
                alt=""
              >
              <img
                class="sketchbook-hover"
                src="assets/sketchbook_hover.png"
                alt=""
              >
            </a>
          </div>
          <div class="home-cell"></div>
          <div class="home-cell"></div>
          <div class="home-cell"></div>
          <div class="home-cell"></div>
          <div class="home-cell"></div>
        </div>
      </section>

      <section id="about-me" aria-labelledby="about-me-title">
        <h2 id="about-me-title">About Me</h2>
      </section>

      <section id="proyectos" aria-labelledby="proyectos-title">
        <h2 id="proyectos-title">Proyectos</h2>
      </section>

      <section id="sketchbook" aria-labelledby="sketchbook-title">
        <h2 id="sketchbook-title">Sketchbook</h2>
      </section>

      <section id="galeria" aria-labelledby="galeria-title">
        <h2 id="galeria-title">Galeria</h2>
      </section>

      <section id="contacto" aria-labelledby="contacto-title">
        <h2 id="contacto-title">Contacto</h2>
      </section>
    </main>
  </body>
</html>
